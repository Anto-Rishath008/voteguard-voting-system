name: Deploy VoteGuard to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🧪 Run tests (if any)
      run: npm run test --if-present

    - name: 🏗️ Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: |
          .next/
          public/
          package*.json
          node_modules/

    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

  database-migration:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: false  # Temporarily disabled due to connection timeout issues
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 📦 Install pg client
      run: npm install pg

    - name: 🗄️ Run database migration
      run: node migrate-to-azure.js
      env:
        AZURE_DB_HOST: ${{ vars.AZURE_DB_HOST }}
        AZURE_DB_USER: ${{ vars.AZURE_DB_USER }}
        AZURE_DB_PASSWORD: ${{ secrets.AZURE_DB_PASSWORD }}
        AZURE_DB_NAME: ${{ vars.AZURE_DB_NAME }}

    - name: ✅ Migration complete
      run: echo "Database migration completed successfully!"