name: Deploy VoteGuard to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🧪 Run tests (if any)
      run: npm run test --if-present

    - name: 🏗️ Build application
      run: npm run build
      env:
        NODE_ENV: production
        AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: � Prepare deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy
        
        # Copy necessary files for deployment
        cp -r .next deploy/
        cp -r public deploy/
        cp -r src deploy/
        cp package*.json deploy/
        cp server.js deploy/
        cp next.config.* deploy/ 2>/dev/null || true
        cp tsconfig.json deploy/ 2>/dev/null || true
        
        # Install production dependencies in deploy directory
        cd deploy
        npm ci --only=production
        cd ..
        
        # Create web.config for Azure App Service
        cat > deploy/web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
            </handlers>
            <rewrite>
              <rules>
                <rule name="StaticContent">
                  <action type="Rewrite" url="public{REQUEST_URI}"/>
                </rule>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="server.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode
              node_env="production"
              nodeProcessCountPerApplication="1"
              maxConcurrentRequestsPerProcess="1024"
              maxNamedPipeConnectionRetry="3"
              namedPipeConnectionRetryDelay="2000"
              maxNamedPipeConnectionPoolSize="512"
              maxNamedPipePooledConnectionAge="30000"
              asyncCompletionThreadCount="0"
              initialRequestBufferSize="4096"
              maxRequestBufferSize="65536"
              watchedFiles="*.js"
              uncFileChangesPollingInterval="5000"
              gracefulShutdownTimeout="60000"
              loggingEnabled="true"
              logDirectoryNameSuffix="logs"
              debuggingEnabled="false"
              devErrorsEnabled="false"
              flushResponse="false"
              enableXFF="false"
              promoteServerVars=""
            />
            <security>
              <requestFiltering>
                <hiddenSegments>
                  <remove segment="bin"/>
                </hiddenSegments>
              </requestFiltering>
            </security>
            <httpErrors existingResponse="PassThrough" />
          </system.webServer>
        </configuration>
        EOF

    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./deploy

  database-health-check:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏥 Azure Database Health Check
      run: |
        node -e "
        const dbUrl = process.env.AZURE_DATABASE_URL;
        if (!dbUrl) {
          console.log('⚠️  AZURE_DATABASE_URL not configured - skipping database health check');
          console.log('Note: Database connection will be tested during runtime');
          process.exit(0);
        }
        
        console.log('🔗 Testing Azure Database connection...');
        const { Client } = require('pg');
        const client = new Client({ connectionString: dbUrl });
        client.connect()
          .then(() => {
            console.log('✅ Database connection established');
            return client.query('SELECT 1 as test');
          })
          .then(() => {
            console.log('✅ Database query successful');
            console.log('✅ Azure Database health check: SUCCESS');
            return client.end();
          })
          .catch(e => { 
            console.error('❌ Database error:', e.message);
            console.error('❌ Connection string format should be: postgresql://user:password@host:port/database?sslmode=require');
            process.exit(1); 
          });
        "
      env:
        AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
        NODE_ENV: production

    - name: ✅ Health check complete
      run: echo "Azure Database health check completed successfully!"