name: Deploy VoteGuard to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🧪 Run tests (if any)
      run: npm run test --if-present

    - name: 🏗️ Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: |
          .next/
          public/
          package*.json
          node_modules/

    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

  database-health-check:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏥 Azure Database Health Check
      run: |
        node -e "
        const { getDatabase } = require('./src/lib/enhanced-database.js');
        const db = getDatabase();
        db.testConnection()
          .then(r => console.log('Database connection:', r ? 'SUCCESS' : 'FAILED'))
          .catch(e => { console.error('Database error:', e); process.exit(1); });
        "
      env:
        AZURE_DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
        NODE_ENV: production

    - name: ✅ Health check complete
      run: echo "Azure Database health check completed successfully!"